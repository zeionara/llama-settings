services:
  llama:
    # image: local/llama.cpp:full-generic-cpu
    image: local/llama.cpp:server-generic-cpu
    container_name: llama-qwen3.5-35b-a3b
    ports:
      - 8000:80
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/models:/models
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/.cache:/root/.cache
    env_file:
      - .env
    # entrypoint: sleep 3600
    entrypoint: >
      /app/llama-server
      --hf-repo unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --ctx-size 16384
      --threads 12
      --alias "unsloth/Qwen3.5-35B-A3B-GGUF"
      --host 0.0.0.0
      --port 80
      --no-mmproj
    # restart: unless-stopped
