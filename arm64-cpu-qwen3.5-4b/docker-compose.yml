services:
  llama:
    # image: local/llama.cpp:full
    image: local/llama.cpp:server
    container_name: llama-qwen3.5-4b
    ports:
      - 8000:80
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/models:/models
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/.cache:/root/.cache
    env_file:
      - .env
    # entrypoint: sleep 3600
    entrypoint: >
      /app/llama-server
      --hf-repo unsloth/Qwen3.5-4B-GGUF:Q4_K_M
      --ctx-size 16384
      --threads 12
      --alias "unsloth/Qwen3.5-4B-GGUF"
      --host 0.0.0.0
      --port 80
      --no-mmproj
      --chat-template-kwargs '{"enable_thinking": true}'
    # restart: unless-stopped
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    # read_only: true
    container_name: openclaw
    tmpfs:
      - /tmp
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/openclaw:/home/node/.openclaw
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/openclaw/workspace:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-8080}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18791"
    # entrypoint: >
    #   openclaw
    #   onboard
    #   --non-interactive
    #   --accept-risk
    #   --auth-choice skip
    #   --custom-base-url "http://localhost:8000/v1"
    #   --custom-model-id "unsloth/Qwen3.5-4B-GGUF"
    #   --secret-input-mode plaintext
    entrypoint: >
      node
      dist/index.js
      gateway
      --bind
      lan
      --port
      18789
      --allow-unconfigured
